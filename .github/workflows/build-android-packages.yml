name: build-and-release-android-packages

on:
  workflow_run:
    workflows:
      - build-and-release-flutter
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (for example: v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_android:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi

          if [ -z "${TAG}" ]; then
            echo "Cannot resolve release tag."
            exit 1
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "Tag must start with v. Resolved tag: ${TAG}"
            exit 1
          fi

          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "APP_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Checkout tag source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Android platform files
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Restore fixed Android debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_DEBUG_KEYSTORE_BASE64}" ]; then
            echo "Missing required repository secret: ANDROID_DEBUG_KEYSTORE_BASE64"
            echo "Run workflow 'bootstrap-android-debug-keystore' once, then add this secret."
            exit 1
          fi

          mkdir -p "${HOME}/.android"
          printf '%s' "${ANDROID_DEBUG_KEYSTORE_BASE64}" | base64 --decode > "${HOME}/.android/debug.keystore"

      - name: Verify and pin signing fingerprint
        env:
          EXPECTED_ANDROID_DEBUG_KEYSTORE_SHA256: ${{ secrets.ANDROID_DEBUG_KEYSTORE_SHA256 }}
        run: |
          keytool -list -v \
            -keystore "${HOME}/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep -E 'Alias name:|SHA1:|SHA256:'

          FINGERPRINT_SHA256="$(keytool -list -v \
            -keystore "${HOME}/.android/debug.keystore" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            | awk -F': ' '/SHA256:/ {print $2; exit}')"

          if [ -z "${FINGERPRINT_SHA256}" ]; then
            echo "Cannot parse SHA256 fingerprint from restored keystore."
            exit 1
          fi

          echo "ANDROID_SIGNING_SHA256=${FINGERPRINT_SHA256}" >> "$GITHUB_ENV"
          echo "Resolved Android signing SHA256: ${FINGERPRINT_SHA256}"

          if [ -n "${EXPECTED_ANDROID_DEBUG_KEYSTORE_SHA256}" ]; then
            EXPECTED_NORMALIZED="$(echo "${EXPECTED_ANDROID_DEBUG_KEYSTORE_SHA256}" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]:')"
            ACTUAL_NORMALIZED="$(echo "${FINGERPRINT_SHA256}" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]:')"
            if [ "${EXPECTED_NORMALIZED}" != "${ACTUAL_NORMALIZED}" ]; then
              echo "Android signing fingerprint mismatch."
              echo "Expected: ${EXPECTED_ANDROID_DEBUG_KEYSTORE_SHA256}"
              echo "Actual:   ${FINGERPRINT_SHA256}"
              exit 1
            fi
          else
            echo "Secret ANDROID_DEBUG_KEYSTORE_SHA256 is not set; strict fingerprint pinning skipped."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Prepare Android release assets
        run: |
          APP_NAME="$(grep -m1 '^name:' pubspec.yaml | awk '{print $2}')"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${APP_NAME}-${APP_VERSION}-android-release.apk"
          cp build/app/outputs/bundle/release/app-release.aab "dist/${APP_NAME}-${APP_VERSION}-android-release.aab"
          printf '%s\n' "${ANDROID_SIGNING_SHA256}" > "dist/${APP_NAME}-${APP_VERSION}-android-signing-sha256.txt"

      - name: Write Android signing summary
        run: |
          {
            echo "## Android signing fingerprint"
            echo ""
            echo "- SHA256: \`${ANDROID_SIGNING_SHA256}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-packages
          path: dist/*

      - name: Attach Android packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*-android-release.apk
            dist/*-android-release.aab
            dist/*-android-signing-sha256.txt
          fail_on_unmatched_files: true
