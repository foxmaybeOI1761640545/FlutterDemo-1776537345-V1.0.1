name: build-and-release-flutter

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run widget tests
        run: flutter test

  build_web:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web support
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Package build output
        run: tar -czf flutter-web-build.tar.gz -C build web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: flutter-web-build.tar.gz

  build_windows:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop support
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Ensure Windows platform files
        shell: pwsh
        run: |
          if (!(Test-Path "windows")) {
            flutter create --platforms=windows .
          }

      - name: Install dependencies
        shell: pwsh
        run: flutter pub get

      - name: Build Windows x64
        shell: pwsh
        run: flutter build windows --release

      - name: Package Windows build output
        shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath flutter-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-x64-build
          path: flutter-windows-x64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build_web
      - build_windows

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show packaged files
        run: ls -R release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/flutter-web-build/flutter-web-build.tar.gz
            release-assets/flutter-windows-x64-build/flutter-windows-x64.zip
