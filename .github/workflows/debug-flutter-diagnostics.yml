name: debug-flutter-diagnostics

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web support
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source with annotations
        shell: bash
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings --machine > analyze.log 2>&1
          status=$?
          python .github/scripts/emit_github_annotations.py dart-machine analyze.log
          if [ "$status" -ne 0 ]; then
            tail -n 200 analyze.log
            exit "$status"
          fi

      - name: Build web with annotations
        shell: bash
        run: |
          set +e
          flutter build web --release > build-web.log 2>&1
          status=$?
          python .github/scripts/emit_github_annotations.py flutter-build build-web.log
          if [ "$status" -ne 0 ]; then
            tail -n 200 build-web.log
            exit "$status"
          fi
