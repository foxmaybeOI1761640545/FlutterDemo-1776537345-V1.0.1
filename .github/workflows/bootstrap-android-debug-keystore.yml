name: bootstrap-android-debug-keystore

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate_keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate reusable debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Export keystore as base64
        run: |
          base64 -w 0 android-debug.keystore > ANDROID_DEBUG_KEYSTORE_BASE64.txt

      - name: Print fingerprint
        run: |
          keytool -list -v \
            -keystore android-debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep -E 'Alias name:|SHA1:|SHA256:'

      - name: Upload secret payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-keystore-secret
          path: ANDROID_DEBUG_KEYSTORE_BASE64.txt

      - name: Write next-step summary
        run: |
          {
            echo "## Android signing bootstrap result"
            echo ""
            echo "1. Download artifact: \`android-debug-keystore-secret\`."
            echo "2. Open \`ANDROID_DEBUG_KEYSTORE_BASE64.txt\` and copy the full line."
            echo "3. Go to repo Settings -> Secrets and variables -> Actions -> New repository secret."
            echo "4. Name: \`ANDROID_DEBUG_KEYSTORE_BASE64\`."
            echo "5. Value: the copied Base64 line, then save."
            echo "6. Re-run workflow \`build-and-release-android-packages\`."
          } >> "$GITHUB_STEP_SUMMARY"
