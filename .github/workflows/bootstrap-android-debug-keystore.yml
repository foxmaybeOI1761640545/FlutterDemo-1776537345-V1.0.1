name: bootstrap-android-debug-keystore

on:
  workflow_dispatch:
    inputs:
      force_rotate:
        description: "Set to true only when intentionally rotating signing key."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  generate_keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Guard against accidental key rotation
        env:
          EXISTING_ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
          FORCE_ROTATE: ${{ inputs.force_rotate }}
        run: |
          FORCE_ROTATE="${FORCE_ROTATE:-false}"
          if [ -n "${EXISTING_ANDROID_DEBUG_KEYSTORE_BASE64}" ] && [ "${FORCE_ROTATE}" != "true" ]; then
            echo "Repository secret ANDROID_DEBUG_KEYSTORE_BASE64 already exists."
            echo "Aborting to avoid accidental signing key rotation."
            echo "Re-run with force_rotate=true only if you intentionally rotate the key."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate reusable debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Export keystore as base64
        run: |
          base64 -w 0 android-debug.keystore > ANDROID_DEBUG_KEYSTORE_BASE64.txt

      - name: Print fingerprint
        run: |
          keytool -list -v \
            -keystore android-debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep -E 'Alias name:|SHA1:|SHA256:'

      - name: Export SHA256 fingerprint
        run: |
          keytool -list -v \
            -keystore android-debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            | awk -F': ' '/SHA256:/ {print $2; exit}' > ANDROID_DEBUG_KEYSTORE_SHA256.txt

      - name: Upload secret payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-keystore-secret
          path: |
            ANDROID_DEBUG_KEYSTORE_BASE64.txt
            ANDROID_DEBUG_KEYSTORE_SHA256.txt

      - name: Write next-step summary
        run: |
          {
            echo "## Android signing bootstrap result"
            echo ""
            echo "1. Download artifact: \`android-debug-keystore-secret\`."
            echo "2. Open \`ANDROID_DEBUG_KEYSTORE_BASE64.txt\` and copy the full line."
            echo "3. Create repository secret \`ANDROID_DEBUG_KEYSTORE_BASE64\` with that Base64 value."
            echo "4. Open \`ANDROID_DEBUG_KEYSTORE_SHA256.txt\` and copy the fingerprint."
            echo "5. Create repository secret \`ANDROID_DEBUG_KEYSTORE_SHA256\` with that fingerprint."
            echo "6. Re-run workflow \`build-and-release-android-packages\`."
            echo ""
            echo "If this is a key rotation, existing installed APKs signed by the old key cannot be upgraded in-place."
          } >> "$GITHUB_STEP_SUMMARY"
